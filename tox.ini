[tox]
no_package = True
skip_missing_interpreters = True
env_list = lint, unit

[vars]
application = kafka
src_path = {tox_root}/machine/src {tox_root}/k8s/src {tox_root}/common
tests_path = {tox_root}/tests
lib_path = {tox_root}/lib/charms/kafka
all_path = {[vars]src_path} {[vars]tests_path}

[testenv]
allowlist_externals =
    /bin/bash
    poetry
set_env =
    PYTHONPATH = {tox_root}/machine/lib:{tox_root}/k8s/lib
    PYTHONBREAKPOINT=ipdb.set_trace
    PY_COLORS=1
    charm: TEST_FILE=test_charm.py
    provider: TEST_FILE=test_provider.py
    provider-v1: TEST_FILE=test_provider_v1.py
    scaling: TEST_FILE=test_scaling.py
    password-rotation: TEST_FILE=test_password_rotation.py
    refresh: TEST_FILE=test_refresh.py
    tls: TEST_FILE=test_tls.py
    tls-complex: TEST_FILE=test_tls_complex.py
    ha: TEST_FILE=ha/test_ha.py
    ha-controller: TEST_FILE=ha/test_ha_controller.py
    kraft: TEST_FILE=test_kraft.py
    balancer-broker: DEPLOYMENT=single
    balancer-controller: DEPLOYMENT=multi
    kraft-tls: TEST_FILE=test_kraft.py
    kraft-tls: TLS=enabled
    spaces: TEST_FILE=test_spaces.py
    auto-balance: TEST_FILE=test_auto_balance.py
    terraform: TEST_FILE=test_terraform.py
    oauth: TEST_FILE=test_oauth.py

pass_env =
    PYTHONPATH
    CHARM_BUILD_DIR
    MODEL_SETTINGS
deps =
    poetry

[testenv:format]
description = Apply coding style standards to code
commands =
    poetry install --only fmt
    poetry run ruff check --fix --select I {[vars]all_path}
    poetry run black {[vars]all_path}

[testenv:lint]
description = Check code against coding style standards
commands =
    poetry install --only lint
    poetry run codespell {tox_root} \
        --skip {tox_root}/.git \
        --skip {tox_root}/.tox \
        --skip {tox_root}/docs \
        --skip {tox_root}/machine/lib \
        --skip {tox_root}/k8s/lib \
        --skip {tox_root}/build \
        --skip {tox_root}/tests/integration/*/lib \
        --skip {tox_root}/venv \
        --skip {tox_root}/.mypy_cache \
        --skip {tox_root}/icon.svg \
        --skip *.lock \
        --skip {tox_root}/tests/unit/test_ssl_principal_mapping.py
    poetry run codespell {[vars]lib_path}

    poetry run ruff check {[vars]all_path}

    poetry install --with lint
    poetry run pyright

[testenv:unit]
description = Run unit tests
pass_env =
    PYTHONPATH
    SUBSTRATE
