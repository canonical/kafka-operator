[testenv:tutorial-extract]
description = Generate tutorial test scripts from Markdown sources
skip_install = True
commands =
    python3 tests/tutorial/extract_commands.py docs/tutorial/ tests/tutorial/

[testenv:tutorial]
description = Run the tutorial end-to-end test suite via Spread (requires Multipass and Spread)
skip_install = True
allowlist_externals =
    spread
commands =
    {[testenv:tutorial-extract]commands}
    spread -vv multipass:ubuntu-24.04-64:tests/tutorial/

[testenv:integration]
description = Run integration tests
pass_env =
    {[testenv]pass_env}
    CI
    CI_PACKED_CHARMS
commands =
    poetry install --with integration
    poetry run pip install -U ./common
    poetry run pytest -vv --tb native --log-cli-level=INFO -s {posargs} {[vars]tests_path}/integration/

[testenv:integration-{auto-balance,charm,ha,ha-controller,kraft,kraft-tls,oauth,password-rotation,provider,provider-v1,refresh,scaling,spaces,terraform,tls,tls-complex}]
description = Run integration tests
pass_env =
    {[testenv]pass_env}
    CI
    TLS
commands =
    poetry install --with integration
    poetry run pip install -U ./common
    poetry run pytest -vv --tb native --log-cli-level=INFO -s {posargs} {[vars]tests_path}/integration/{env:TEST_FILE}

[testenv:integration-balancer-{broker,controller}]
description = Run balancer tests
pass_env =
    {[testenv]pass_env}
    CI
commands =
    poetry install --with integration
    poetry run pip install -U ./common
    poetry run pytest -vv --tb native --log-cli-level=INFO -s {posargs} {[vars]tests_path}/integration/test_balancer.py


[testenv:charm-pack]
description = Build charm from source
allowlist_externals =
    python3
commands =
    python3 {tox_root}/_pack.py {posargs}