name: Promote charms

on:
  workflow_dispatch:
    inputs:
      revisions:
        description: |
          Comma-separated list of git revision tags to promote.
          These must match the tags created by canonical/data-platform-workflows release_charm_edge.yaml

          Single-charm repo example: 'rev123,rev124'
          Monorepo example: 'mysql/rev123,mysql-k8s/rev124'
        required: true
        type: string
      to-risk:
        description: Promote to this Charmhub risk
        required: true
        type: choice
        options:
          - beta
          - candidate
          - stable

jobs:
  tutorial-tests:
    name: Tutorial gate (beta → candidate)
    if: ${{ inputs.to-risk == 'candidate' }}
    uses: ./.github/workflows/tutorial-tests.yaml
    secrets: inherit

  promote:
    name: Promote charms
    needs:
      - tutorial-tests
    # Run even when tutorial-tests is skipped (non beta→candidate promotions).
    if: ${{ !failure() && !cancelled() }}
    uses: canonical/data-platform-workflows/.github/workflows/_promote_charms.yaml@v49.0.1
    with:
      track: '4'
      revisions: ${{ inputs.revisions }}
      to-risk: ${{ inputs.to-risk }}
    secrets:
      charmhub-token: ${{ secrets.CHARMHUB_TOKEN }}
    permissions:
      actions: read  # Needed for Github API call to get workflow version
      contents: write  # Needed to edit GitHub releases

  trigger-release-ci:
    name: Trigger release CI
    runs-on: ubuntu-latest
    needs: promote
    steps:
      - name: Trigger Airflow DAG
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://airflow.data-platform.ps7.canonical.com/api/v2/dags/kafka_4.x_vm/dagRuns" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AIRFLOW_API_TOKEN }}" \
            -d "{
              \"dag_run_id\": \"promote-${{ github.run_id }}\",
              \"logical_date\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
              \"conf\": {
                \"charm\": \"kafka\",
                \"version\": \"${{ github.ref_name }}\"
              }
            }")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "$body"
          if echo "$body" | grep -q '"detail":"Token Expired"'; then
            echo "::error::Airflow API token has expired"
            exit 1
          fi
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Airflow API request failed with status $http_code"
            exit 1
          fi
    permissions: {}
