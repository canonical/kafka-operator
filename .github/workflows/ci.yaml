name: Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'terraform/**'
      - '.gitignore'
  schedule:
    - cron: '53 0 * * *'  # Daily at 00:53 UTC
  workflow_dispatch:
  # Triggered on push to branch "main" by .github/workflows/release.yaml
  workflow_call:
    outputs:
      artifact-prefix:
        description: build_charm.yaml `artifact-prefix` output
        value: ${{ jobs.build.outputs.artifact-prefix }}

env:
  JUJU_CHANNEL: "3.6/stable"
  MICROK8S_CHANNEL: "1.28-strict/stable"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install tox
        run: pipx install tox
      - name: Run linters
        run: tox run -e lint

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install tox
        run: pipx install tox
      - name: Run tests
        run: tox run -e unit

  # FIXME: remove this once charmcraft monorepo feature is released.
  build-dev:
    if: ${{ github.ref_name != 'main' }}
    strategy:
      matrix:
        path:
          - machine
          - k8s
          - tests/integration/machine/app-charm
          - tests/integration/k8s/app-charm
    name: Build charm for testing | ${{ matrix.path }}
    uses: ./.github/workflows/_build_charm_dev.yaml
    with:
      path-to-charm-directory: ${{ matrix.path }}
    permissions:
      actions: read
      contents: read

  build-release:
    if: ${{ github.ref_name == 'main' }}
    strategy:
      matrix:
        path:
          - machine
          - k8s
          - tests/integration/machine/app-charm
          - tests/integration/k8s/app-charm
    name: Build charm for release | ${{ matrix.path }}
    uses: canonical/data-platform-workflows/.github/workflows/build_charm.yaml@v32.2.2
    with:
      path-to-charm-directory: ${{ matrix.path }}
      cache: false  # TODO: remove after re-added to ccc-hub
    permissions:
      actions: read
      contents: read

  integration-test-single:
    strategy:
      fail-fast: false
      matrix:
        tox-environments:
          - integration-machine-auto-balance
          - integration-machine-charm
          - integration-machine-provider
          - integration-machine-provider-v1
          - integration-machine-password-rotation
          - integration-machine-tls
          - integration-machine-refresh
          - integration-machine-tls-complex
          - integration-machine-kraft
          - integration-machine-kraft-tls
          - integration-machine-ha
          - integration-machine-spaces
          - integration-machine-terraform
        kraft-mode:
          - single
    name: "${{ matrix.tox-environments }} | machine | ${{ matrix.kraft-mode }}"
    needs:
      - lint
      - unit-test
      - build-dev
      - build-release
    if: |
      always() &&
      !cancelled() &&
      (needs.build-dev.result == 'success' || needs.build-release.result == 'success')
    runs-on: [self-hosted, linux, AMD64, X64, large, noble]
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup operator environment
        uses: charmed-kubernetes/actions-operator@main
        with:
          provider: lxd
          juju-channel: 3.6/stable
      - name: Download packed charm(s)
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ needs.build-dev.outputs.artifact-prefix || needs.build-release.outputs.artifact-prefix }}-*
          merge-multiple: true
      - name: Setup terraform if needed
        if: ${{ matrix.tox-environments == 'integration-machine-terraform' }}
        run: |
          sudo snap install --classic terraform
      - name: Select tests
        id: select-tests
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]
          then
            echo Running unstable and stable tests
            echo "mark_expression=" >> $GITHUB_OUTPUT
          else
            echo Skipping unstable tests
            echo "mark_expression=not unstable" >> $GITHUB_OUTPUT
          fi
      - name: Run integration tests
        run: tox run -e ${{ matrix.tox-environments }} -- -m '${{ steps.select-tests.outputs.mark_expression }}' --kraft-mode ${{ matrix.kraft-mode }}
        env:
          CI_PACKED_CHARMS: ${{ needs.build-dev.outputs.charms || needs.build-release.outputs.charms }}

  integration-test-multi:
    strategy:
      fail-fast: false
      matrix:
        tox-environments:
          - integration-machine-auto-balance
          - integration-machine-charm
          - integration-machine-provider
          - integration-machine-provider-v1
          - integration-machine-password-rotation
          - integration-machine-tls
          - integration-machine-refresh
          - integration-machine-tls-complex
          - integration-machine-balancer-broker
          - integration-machine-balancer-controller
          - integration-machine-kraft
          - integration-machine-kraft-tls
          - integration-machine-ha
          - integration-machine-ha-controller
          - integration-machine-spaces
          - integration-machine-oauth
        kraft-mode:
          - multi
    name: "${{ matrix.tox-environments }} | machine | ${{ matrix.kraft-mode }}"
    needs:
      - lint
      - unit-test
      - build-dev
      - build-release
    if: |
      always() &&
      !cancelled() &&
      (needs.build-dev.result == 'success' || needs.build-release.result == 'success')
    runs-on: [self-hosted, linux, AMD64, X64, xlarge, noble]
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup operator environment
        uses: charmed-kubernetes/actions-operator@main
        with:
          provider: lxd
          juju-channel: 3.6/stable
      - name: Download packed charm(s)
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ needs.build-dev.outputs.artifact-prefix || needs.build-release.outputs.artifact-prefix }}-*
          merge-multiple: true
      - name: Setup terraform & microk8s controller (for OAuth tests)
        if: ${{ matrix.tox-environments == 'integration-machine-oauth' }}
        run: |
          LXD_CONTROLLER=$(juju models --format json | jq -r '.models[0]."controller-name"')
          sudo snap install --classic terraform

          # calico has issues with strict confinements, so remove -strict
          sudo snap install microk8s --channel 1.32 --classic

          sudo usermod -a -G microk8s $USER
          mkdir -p ~/.kube
          chmod 0700 ~/.kube

          sudo tee /var/snap/microk8s/current/args/certs.d/docker.io/hosts.toml << EOF
          server = "$DOCKERHUB_MIRROR"
          [host."${DOCKERHUB_MIRROR#'https://'}"]
          capabilities = ["pull", "resolve"]
          EOF

          sudo microk8s stop
          sudo microk8s start

          # make juju work with microk8s --classic
          sudo mkdir -p /var/snap/juju/current/microk8s/credentials
          sudo microk8s config | sudo tee /var/snap/juju/current/microk8s/credentials/client.config
          sudo chown -R $USER:$USER /var/snap/juju/current/microk8s/credentials

          IP_ADDR=$(ip -4 -j route get 2.2.2.2 | jq -r '.[] | .prefsrc')
          sudo microk8s enable dns
          sudo microk8s enable hostpath-storage
          sudo microk8s enable metallb:$IP_ADDR-$IP_ADDR

          juju bootstrap microk8s
          juju switch $LXD_CONTROLLER

      - name: Select tests
        id: select-tests
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]
          then
            echo Running unstable and stable tests
            echo "mark_expression=" >> $GITHUB_OUTPUT
          else
            echo Skipping unstable tests
            echo "mark_expression=not unstable" >> $GITHUB_OUTPUT
          fi
      - name: Run integration tests
        run: tox run -e ${{ matrix.tox-environments }} -- -m '${{ steps.select-tests.outputs.mark_expression }}' --keep-models --kraft-mode ${{ matrix.kraft-mode }}
        env:
          CI_PACKED_CHARMS: ${{ needs.build-dev.outputs.charms || needs.build-release.outputs.charms }}

  integration-test-k8s-single:
    strategy:
      fail-fast: false
      matrix:
        tox-environments:
          - integration-k8s-auto-balance
          - integration-k8s-charm
          - integration-k8s-provider
          - integration-k8s-provider-v1
          - integration-k8s-password-rotation
          - integration-k8s-tls
          - integration-k8s-tls-complex
          - integration-k8s-kraft
          - integration-k8s-kraft-tls
          - integration-k8s-ha
          - integration-k8s-refresh
        kraft-mode:
          - single
    name: "${{ matrix.tox-environments }} | k8s | ${{ matrix.kraft-mode }}"
    needs:
      - lint
      - unit-test
      - build-dev
      - build-release
    if: |
      always() &&
      !cancelled() &&
      (needs.build-dev.result == 'success' || needs.build-release.result == 'success')
    runs-on: [self-hosted, linux, AMD64, X64, large, noble]
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup operator environment
        run: |
          sudo snap install concierge --classic
          # calico has issues with strict confinements, so remove -strict
          sudo snap install microk8s --channel ${MICROK8S_CHANNEL//"-strict"/} --classic
          sudo snap install juju --channel $JUJU_CHANNEL

          sudo usermod -a -G microk8s $USER
          mkdir -p ~/.kube
          chmod 0700 ~/.kube

          sudo tee /var/snap/microk8s/current/args/certs.d/docker.io/hosts.toml << EOF
          server = "$DOCKERHUB_MIRROR"
          [host."${DOCKERHUB_MIRROR#'https://'}"]
          capabilities = ["pull", "resolve"]
          EOF

          sudo microk8s stop
          sudo microk8s start

          # make juju work with microk8s --classic
          sudo mkdir -p /var/snap/juju/current/microk8s/credentials
          sudo microk8s config | sudo tee /var/snap/juju/current/microk8s/credentials/client.config
          sudo chown -R $USER:$USER /var/snap/juju/current/microk8s/credentials

          sudo concierge prepare \
            -p microk8s \
            --microk8s-channel ${MICROK8S_CHANNEL//"-strict"/} \
            --juju-channel $JUJU_CHANNEL \
            --extra-debs pipx

          pipx ensurepath
          pipx install tox poetry
      - name: Download packed charm(s)
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ needs.build-dev.outputs.artifact-prefix || needs.build-release.outputs.artifact-prefix }}-*
          merge-multiple: true
      - name: Select tests
        id: select-tests
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]
          then
            echo Running unstable and stable tests
            echo "mark_expression=" >> $GITHUB_OUTPUT
          else
            echo Skipping unstable tests
            echo "mark_expression=not unstable" >> $GITHUB_OUTPUT
          fi
      - name: Run integration tests
        run: tox run -e ${{ matrix.tox-environments }} -- -m '${{ steps.select-tests.outputs.mark_expression }}' --keep-models --kraft-mode ${{ matrix.kraft-mode }}
        env:
          CI_PACKED_CHARMS: ${{ needs.build-dev.outputs.charms || needs.build-release.outputs.charms }}

  integration-test-k8s-multi:
    strategy:
      fail-fast: false
      matrix:
        tox-environments:
          - integration-k8s-auto-balance
          - integration-k8s-charm
          - integration-k8s-provider
          - integration-k8s-provider-v1
          - integration-k8s-password-rotation
          - integration-k8s-tls
          - integration-k8s-tls-complex
          - integration-k8s-balancer-single
          - integration-k8s-balancer-multi
          - integration-k8s-kraft
          - integration-k8s-kraft-tls
          - integration-k8s-ha
          - integration-k8s-ha-controller
          - integration-k8s-refresh
        kraft-mode:
          - multi
    name: ${{ matrix.tox-environments }} | k8s | ${{ matrix.kraft-mode }}
    needs:
      - lint
      - unit-test
      - build-dev
      - build-release
    if: |
      always() &&
      !cancelled() &&
      (needs.build-dev.result == 'success' || needs.build-release.result == 'success')
    runs-on: [self-hosted, linux, AMD64, X64, xlarge, noble]
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup operator environment
        run: |
          sudo snap install concierge --classic
          # calico has issues with strict confinements, so remove -strict
          sudo snap install microk8s --channel ${MICROK8S_CHANNEL//"-strict"/} --classic
          sudo snap install juju --channel $JUJU_CHANNEL

          sudo usermod -a -G microk8s $USER
          mkdir -p ~/.kube
          chmod 0700 ~/.kube

          sudo tee /var/snap/microk8s/current/args/certs.d/docker.io/hosts.toml << EOF
          server = "$DOCKERHUB_MIRROR"
          [host."${DOCKERHUB_MIRROR#'https://'}"]
          capabilities = ["pull", "resolve"]
          EOF

          sudo microk8s stop
          sudo microk8s start

          # make juju work with microk8s --classic
          sudo mkdir -p /var/snap/juju/current/microk8s/credentials
          sudo microk8s config | sudo tee /var/snap/juju/current/microk8s/credentials/client.config
          sudo chown -R $USER:$USER /var/snap/juju/current/microk8s/credentials

          sudo concierge prepare \
            -p microk8s \
            --microk8s-channel ${MICROK8S_CHANNEL//"-strict"/} \
            --juju-channel $JUJU_CHANNEL \
            --extra-debs pipx
          
          pipx ensurepath
          pipx install tox poetry
      - name: Download packed charm(s)
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ needs.build-dev.outputs.artifact-prefix || needs.build-release.outputs.artifact-prefix }}-*
          merge-multiple: true
      - name: Select tests
        id: select-tests
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]
          then
            echo Running unstable and stable tests
            echo "mark_expression=" >> $GITHUB_OUTPUT
          else
            echo Skipping unstable tests
            echo "mark_expression=not unstable" >> $GITHUB_OUTPUT
          fi
      - name: Run integration tests
        run: tox run -e ${{ matrix.tox-environments }} -- -m '${{ steps.select-tests.outputs.mark_expression }}' --keep-models --kraft-mode ${{ matrix.kraft-mode }}
        env:
          CI_PACKED_CHARMS: ${{ needs.build-dev.outputs.charms || needs.build-release.outputs.charms }}
