name: Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'terraform/**'
      - '.gitignore'
  schedule:
    - cron: '53 0 * * *'  # Daily at 00:53 UTC
  workflow_dispatch:
  # Triggered on push to branch "main" by .github/workflows/release.yaml
  workflow_call:
    outputs:
      artifact-prefix:
        description: build_charm.yaml `artifact-prefix` output
        value: ${{ jobs.build.outputs.artifact-prefix }}

env:
  JUJU_CHANNEL: "3.6/stable"
  MICROK8S_CHANNEL: "1.28-strict/stable"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install tox
        run: pipx install tox
      - name: Run linters
        run: tox run -e lint

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install tox
        run: pipx install tox
      - name: Run tests
        run: tox run -e unit

  # FIXME: remove this once charmcraft monorepo feature is released.
  build-dev:
    if: ${{ github.ref_name != 'main' }}
    strategy:
      matrix:
        path:
          - machine
          - k8s
          - connect_machine
          - connect_k8s
          - tests/integration/machine/app-charm
          - tests/integration/k8s/app-charm
          - tests/integration/connect_machine/sink-integrator-charm
          - tests/integration/connect_machine/source-integrator-charm
          - tests/integration/connect_k8s/app-charm
    name: Build charm for testing | ${{ matrix.path }}
    uses: ./.github/workflows/_build_charm_dev.yaml
    with:
      path-to-charm-directory: ${{ matrix.path }}
    permissions:
      actions: read
      contents: read

  build-release:
    if: ${{ github.ref_name == 'main' }}
    strategy:
      matrix:
        path:
          - machine
          - k8s
          - connect_machine
          - connect_k8s
          - tests/integration/machine/app-charm
          - tests/integration/k8s/app-charm
          - tests/integration/connect_machine/sink-integrator-charm
          - tests/integration/connect_machine/source-integrator-charm
          - tests/integration/connect_k8s/app-charm
    name: Build charm for release | ${{ matrix.path }}
    uses: canonical/data-platform-workflows/.github/workflows/build_charm.yaml@v32.2.2
    with:
      path-to-charm-directory: ${{ matrix.path }}
      cache: false  # TODO: remove after re-added to ccc-hub
    permissions:
      actions: read
      contents: read

  # Collects one spread job per tests/spread/connect_k8s/*/task.yaml and fans them
  # out across runners.
  collect-connect-k8s-spread:
    name: Collect spread jobs - Connect k8s
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install spread
        run: |
          sudo snap install go --classic
          go install github.com/canonical/spread/cmd/spread@latest
      - name: Collect spread jobs
        id: collect-jobs
        shell: python
        run: |
          import json
          import os
          import pathlib
          import subprocess

          spread_jobs = (
              subprocess.run(
                  [pathlib.Path.home() / "go/bin/spread", "-list", "github-ci"],
                  capture_output=True,
                  check=True,
                  text=True,
              )
              .stdout.strip()
              .split("\n")
          )
          jobs = []
          for job in spread_jobs:
              # Example: "github-ci:ubuntu-24.04:tests/spread/connect_k8s/test_charm.py"
              if "tests/spread/connect_k8s/" not in job:
                  continue
              task = job.split(":")[2].removeprefix("tests/spread/connect_k8s/")
              jobs.append({"spread_job": job, "name": task})
          output = f"jobs={json.dumps(jobs)}"
          print(output)
          with open(os.environ["GITHUB_OUTPUT"], "a") as file:
              file.write(output)
    outputs:
      jobs: ${{ steps.collect-jobs.outputs.jobs }}

  integration-connect-k8s-spread:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        job: ${{ fromJSON(needs.collect-connect-k8s-spread.outputs.jobs) }}
    name: "Connect | k8s | ${{ matrix.job.name }}"
    needs:
      - lint
      - unit-test
      - build-dev
      - build-release
      - collect-connect-k8s-spread
    if: |
      always() &&
      !cancelled() &&
      (needs.build-dev.result == 'success' || needs.build-release.result == 'success')
    runs-on: [self-hosted, linux, AMD64, X64, medium, noble]
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install spread
        run: |
          sudo snap install go --classic
          go install github.com/canonical/spread/cmd/spread@latest
      - name: Download packed charm(s)
        uses: actions/download-artifact@v6
        with:
          pattern: ${{ needs.build-dev.outputs.artifact-prefix || needs.build-release.outputs.artifact-prefix }}-*
          merge-multiple: true
      - name: Run spread job
        run: ~/go/bin/spread -vv "${VAR_SPREAD_JOB}"
        env:
          VAR_SPREAD_JOB: ${{ matrix.job.spread_job }}

  # Collects one spread job per tests/spread/connect_machine/*/task.yaml (x Kafka
  # variant) and fans them out across runners.
  collect-connect-machine-spread:
    name: Collect spread jobs - Connect machine
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install spread
        run: |
          sudo snap install go --classic
          go install github.com/canonical/spread/cmd/spread@latest
      - name: Collect spread jobs
        id: collect-jobs
        shell: python
        run: |
          import json
          import os
          import pathlib
          import subprocess

          spread_jobs = (
              subprocess.run(
                  [pathlib.Path.home() / "go/bin/spread", "-list", "github-ci"],
                  capture_output=True,
                  check=True,
                  text=True,
              )
              .stdout.strip()
              .split("\n")
          )
          jobs = []
          for job in spread_jobs:
              # Kafka-parametrized: "github-ci:ubuntu-24.04:tests/spread/connect_machine/test_charm.py:v4"
              # terraform (no variant): "github-ci:ubuntu-24.04:tests/spread/connect_machine/test_terraform.py"
              if "tests/spread/connect_machine/" not in job:
                  continue
              parts = job.split(":")
              task = parts[2].removeprefix("tests/spread/connect_machine/")
              variant = parts[3] if len(parts) > 3 else ""
              name = f"{task}:{variant}" if variant else task
              jobs.append({"spread_job": job, "name": name})
          output = f"jobs={json.dumps(jobs)}"
          print(output)
          with open(os.environ["GITHUB_OUTPUT"], "a") as file:
              file.write(output)
    outputs:
      jobs: ${{ steps.collect-jobs.outputs.jobs }}

  integration-connect-machine-spread:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        job: ${{ fromJSON(needs.collect-connect-machine-spread.outputs.jobs) }}
    name: "Connect | machine | ${{ matrix.job.name }}"
    needs:
      - lint
      - unit-test
      - build-dev
      - build-release
      - collect-connect-machine-spread
    if: |
      always() &&
      !cancelled() &&
      (needs.build-dev.result == 'success' || needs.build-release.result == 'success')
    runs-on: [self-hosted, linux, AMD64, X64, large, noble]
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install spread
        run: |
          sudo snap install go --classic
          go install github.com/canonical/spread/cmd/spread@latest
      - name: Download packed charm(s)
        uses: actions/download-artifact@v6
        with:
          pattern: ${{ needs.build-dev.outputs.artifact-prefix || needs.build-release.outputs.artifact-prefix }}-*
          merge-multiple: true
      - name: Run spread job
        run: ~/go/bin/spread -vv "${VAR_SPREAD_JOB}"
        env:
          VAR_SPREAD_JOB: ${{ matrix.job.spread_job }}

  # Collects one spread job per tests/spread/machine/*/task.yaml (x kraft-mode
  # variant) and fans them out across runners.
  collect-machine-spread:
    name: Collect spread jobs - Kafka machine
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install spread
        run: |
          sudo snap install go --classic
          go install github.com/canonical/spread/cmd/spread@latest
      - name: Collect spread jobs
        id: collect-jobs
        shell: python
        run: |
          import json
          import os
          import pathlib
          import subprocess

          spread_jobs = (
              subprocess.run(
                  [pathlib.Path.home() / "go/bin/spread", "-list", "github-ci"],
                  capture_output=True,
                  check=True,
                  text=True,
              )
              .stdout.strip()
              .split("\n")
          )
          jobs = []
          for job in spread_jobs:
              # kraft-parametrized: "github-ci:ubuntu-24.04:tests/spread/machine/charm:single"
              # single/multi-only (no variant): "github-ci:ubuntu-24.04:tests/spread/machine/terraform"
              # The literal "tests/spread/machine/" never appears in connect_machine paths.
              if "tests/spread/machine/" not in job:
                  continue
              parts = job.split(":")
              task = parts[2].removeprefix("tests/spread/machine/")
              variant = parts[3] if len(parts) > 3 else ""
              name = f"{task}:{variant}" if variant else task
              jobs.append({"spread_job": job, "name": name})
          output = f"jobs={json.dumps(jobs)}"
          print(output)
          with open(os.environ["GITHUB_OUTPUT"], "a") as file:
              file.write(output)
    outputs:
      jobs: ${{ steps.collect-jobs.outputs.jobs }}

  integration-machine-spread:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        job: ${{ fromJSON(needs.collect-machine-spread.outputs.jobs) }}
    name: "Kafka | machine | ${{ matrix.job.name }}"
    needs:
      - lint
      - unit-test
      - build-dev
      - build-release
      - collect-machine-spread
    if: |
      always() &&
      !cancelled() &&
      (needs.build-dev.result == 'success' || needs.build-release.result == 'success')
    runs-on: [self-hosted, linux, AMD64, X64, xlarge, noble]
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install spread
        run: |
          sudo snap install go --classic
          go install github.com/canonical/spread/cmd/spread@latest
      - name: Download packed charm(s)
        uses: actions/download-artifact@v6
        with:
          pattern: ${{ needs.build-dev.outputs.artifact-prefix || needs.build-release.outputs.artifact-prefix }}-*
          merge-multiple: true
      - name: Run spread job
        run: ~/go/bin/spread -vv "${VAR_SPREAD_JOB}"
        env:
          VAR_SPREAD_JOB: ${{ matrix.job.spread_job }}

  collect-k8s-spread:
    name: Collect spread jobs - Kafka k8s
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install spread
        run: |
          sudo snap install go --classic
          go install github.com/canonical/spread/cmd/spread@latest
      - name: Collect spread jobs
        id: collect-jobs
        shell: python
        run: |
          import json
          import os
          import pathlib
          import subprocess

          spread_jobs = (
              subprocess.run(
                  [pathlib.Path.home() / "go/bin/spread", "-list", "github-ci"],
                  capture_output=True,
                  check=True,
                  text=True,
              )
              .stdout.strip()
              .split("\n")
          )
          jobs = []
          for job in spread_jobs:
              # kraft-parametrized: "github-ci:ubuntu-24.04:tests/spread/k8s/charm:single"
              # multi-only (no variant): "github-ci:ubuntu-24.04:tests/spread/k8s/balancer-broker"
              # The literal "tests/spread/k8s/" never appears in connect_k8s paths.
              if "tests/spread/k8s/" not in job:
                  continue
              parts = job.split(":")
              task = parts[2].removeprefix("tests/spread/k8s/")
              variant = parts[3] if len(parts) > 3 else ""
              name = f"{task}:{variant}" if variant else task
              jobs.append({"spread_job": job, "name": name})
          output = f"jobs={json.dumps(jobs)}"
          print(output)
          with open(os.environ["GITHUB_OUTPUT"], "a") as file:
              file.write(output)
    outputs:
      jobs: ${{ steps.collect-jobs.outputs.jobs }}

  integration-k8s-spread:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        job: ${{ fromJSON(needs.collect-k8s-spread.outputs.jobs) }}
    name: "Kafka | k8s | ${{ matrix.job.name }}"
    needs:
      - lint
      - unit-test
      - build-dev
      - build-release
      - collect-k8s-spread
    if: |
      always() &&
      !cancelled() &&
      (needs.build-dev.result == 'success' || needs.build-release.result == 'success')
    runs-on: [self-hosted, linux, AMD64, X64, xlarge, noble]
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install spread
        run: |
          sudo snap install go --classic
          go install github.com/canonical/spread/cmd/spread@latest
      - name: Download packed charm(s)
        uses: actions/download-artifact@v6
        with:
          pattern: ${{ needs.build-dev.outputs.artifact-prefix || needs.build-release.outputs.artifact-prefix }}-*
          merge-multiple: true
      - name: Run spread job
        run: ~/go/bin/spread -vv "${VAR_SPREAD_JOB}"
        env:
          VAR_SPREAD_JOB: ${{ matrix.job.spread_job }}
