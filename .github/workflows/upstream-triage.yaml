name: Upstream Triage

on:
  schedule:
    - cron: '0 9 1 * *'  # Monthly on the 1st at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  triage:
    uses: canonical/upstreamtriage/.github/workflows/product-feature-triage.yaml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
